[project]
name = "switchyard"
version = "0.1.0"
description = "Local Docker registry with async upstream sync"
requires-python = ">=3.12"
dependencies = [
    "starlette>=0.40",
    "granian[uvloop]>=1.6",
    "httpx>=0.27",
    "loguru>=0.7",
]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "respx>=0.22",
    "ruff>=0.8",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/switchyard"]

[tool.ruff]
line-length = 99
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
